# settings.toml: Configuration for Spanner documentation mirror

# Discovery entry points
seeds = [
    "https://docs.cloud.google.com/spanner/docs",
    "https://docs.cloud.google.com/sdk/gcloud/reference/spanner",
    "https://docs.cloud.google.com/spanner/docs/samples/spanner-add-column",
    "https://docs.cloud.google.com/spanner-omni/overview",
    "https://cloud.google.com/spanner",
]

# Sitemap URL(s) to discover links
# sitemaps = ["https://cloud.google.com/sitemap.xml"]

# Path prefixes to mirror
prefixes = [
    "docs.cloud.google.com/spanner/",
    "docs.cloud.google.com/spanner-omni/",
    "docs.cloud.google.com/sdk/gcloud/reference/spanner/",
    "docs.cloud.google.com/sdk/gcloud/reference/alpha/spanner/",
    "docs.cloud.google.com/sdk/gcloud/reference/beta/spanner/",
    # Legacy documentation links are retained narrowly for redirect recovery.
    "cloud.google.com/spanner/docs/",
    "cloud.google.com/sdk/gcloud/reference/spanner/",
    "cloud.google.com/sdk/gcloud/reference/alpha/spanner/",
    "cloud.google.com/sdk/gcloud/reference/beta/spanner/",
]

# Recursive discovery from Markdown content
recursive = true

# Resume from existing progress in logs (default: false)
# resume = false

# Rate limiting: requests per minute (default: 50.0)
# qpm = 50.0

# Wait duration when quota is exceeded (default: 1m10s)
# qw = "1m10s"
