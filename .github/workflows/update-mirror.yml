name: Update Documentation Mirror

on:
  schedule:
    # Runs at 18:00 UTC every day (03:00 JST)
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write # Required to push changes back to the repository
  id-token: write # Required for Google Cloud Workload Identity Federation

jobs:
  update-mirror:
    runs-on: ubuntu-latest
    env:
      TOOL_VERSION: v0.2.9
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get current date
        run: echo "TODAY=$(date -u +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Download Mirror Tool Binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading ${{ env.TOOL_VERSION }} for linux-amd64..."
          gh release download "${{ env.TOOL_VERSION }}" \
            --repo apstndb/gcp-docs-mirror-tools \
            --pattern "*linux-amd64.tar.gz" \
            --output tool.tar.gz
          
          tar -xzf tool.tar.gz
          chmod +x gcp-docs-mirror-tools
          rm tool.tar.gz

      - name: Authenticate to Google Cloud
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Run mirror script
        env:
          # Only pass the API key if WIF is not configured, as the tool prioritizes API keys over ADC/WIF.
          DEVELOPERKNOWLEDGE_API_KEY: ${{ (secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || secrets.GCP_SERVICE_ACCOUNT == '') && secrets.DEVELOPERKNOWLEDGE_API_KEY || '' }}
        run: |
          chmod +x mirror.sh
          ./mirror.sh "${{ env.TOOL_VERSION }}"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: auto-update ${{ env.TODAY }} [skip ci]"
          file_pattern: 'docs/ metadata.yaml logs/'
